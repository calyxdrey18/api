<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Calyx-MD Pair Code</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"/>
  <style>
    :root {
      --primary-color: #56a6ff;
      --secondary-color: #ffffff;
      --accent-color: #0e2f55;
      --text-color: #c0d9ff;
      --background-color: #0b121e;
      --hover-color: #192c52;
      --border-color: rgba(86, 166, 255, 0.25);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--background-color);
      color: var(--text-color);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 15px;
      user-select: none;
    }

    .container {
      width: 100%;
      max-width: 400px;
      background: var(--accent-color);
      border-radius: 20px;
      padding: 25px 30px 30px 30px;
      box-shadow: 0 0 32px #3a7eee88;
      border: 1.5px solid var(--border-color);
      text-align: center;
      position: relative;
    }

    .header {
      margin-bottom: 28px;
    }

    /* Calyx </> Studio Logo style */
    .logo {
      width: 70px;
      height: 70px;
      margin: 0 auto 16px;
      background: var(--primary-color);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      color: var(--secondary-color);
      box-shadow: 0 4px 18px #56a6ffbb;
      user-select: none;
    }

    .title {
      font-size: 26px;
      font-weight: 700;
      margin-bottom: 6px;
      color: var(--primary-color);
      letter-spacing: 0.04em;
      user-select: none;
    }

    .subtitle {
      font-size: 14px;
      color: #a5c9ffdd;
      margin-bottom: 22px;
      user-select: none;
      letter-spacing: 0.01em;
    }

    .social-icons {
      display: flex;
      justify-content: center;
      gap: 14px;
      margin-bottom: 30px;
    }

    .social-icons a {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--secondary-color);
      font-size: 18px;
      text-decoration: none;
      box-shadow: 0 0 10px #4ea8ff80;
      transition: all 0.3s ease;
      user-select: none;
    }

    .social-icons a.youtube { background: #FF0000; }
    .social-icons a.telegram { background: #0088cc; }
    .social-icons a.whatsapp { background: #25d366; }
    .social-icons a.github { background: #333; }

    .social-icons a:hover {
      transform: scale(1.1);
      box-shadow: 0 0 18px #4ea8ffcc;
    }


    .input-group {
      margin-bottom: 20px;
      text-align: left;
    }

    .input-label {
      font-weight: 600;
      font-size: 13px;
      color: #a4c8ffcc;
      margin-bottom: 8px;
      display: block;
      user-select: none;
      letter-spacing: 0.01em;
    }

    input.input-field {
      width: 100%;
      padding: 12px;
      border: 1.8px solid var(--border-color);
      border-radius: 14px;
      background: var(--hover-color);
      color: var(--secondary-color);
      font-size: 15px;
      font-weight: 500;
      transition: border-color 0.3s;
      user-select: text;
    }
    input.input-field::placeholder {
      color: #a3c0ffaa;
    }
    input.input-field:focus {
      outline: none;
      border-color: var(--primary-color);
      box-shadow: 0 0 10px #56a6ff99;
      background: var(--background-color);
    }

    .generate-btn {
      width: 100%;
      padding: 14px;
      background: var(--primary-color);
      border: none;
      border-radius: 24px;
      color: var(--secondary-color);
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      user-select: none;
      box-shadow: 0 0 18px #56a6ffbb;
    }

    .generate-btn:hover {
      background: #3b8aff;
      box-shadow: 0 0 32px #3b8affcc;
      transform: translateY(-2px);
    }

    .code-display {
      background: var(--hover-color);
      padding: 14px 16px;
      border-radius: 16px;
      text-align: center;
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 20px;
      min-height: 44px;
      border: 1.8px solid var(--border-color);
      color: var(--secondary-color);
      user-select: text;
      display: flex;
      align-items: center;
      justify-content: center;
      word-break: break-word;
    }

    .copy-btn {
      width: 100%;
      padding: 12px;
      background: var(--hover-color);
      border: 1.8px solid var(--border-color);
      border-radius: 24px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: var(--secondary-color);
      transition: background 0.3s, border-color 0.3s;
      user-select: none;
      box-shadow: 0 0 12px #56a6ff88;
    }

    .copy-btn:hover {
      background: var(--background-color);
      border-color: var(--primary-color);
      box-shadow: 0 0 24px #3a7fffcc;
    }

    /* Success and error messages */
    .success-message {
      color: #7cc4ff;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-size: 16px;
      font-weight: 600;
      user-select: none;
    }

    .error-message {
      color: #ff6b6b;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-size: 14px;
      font-weight: 600;
      user-select: none;
    }

    /* Loading spinner */
    .loading {
      display: none;
      text-align: center;
      margin: 20px 0;
    }
    .loading i {
      font-size: 26px;
      color: var(--primary-color);
      animation: spin 1s linear infinite;
      user-select: none;
    }
    @keyframes spin {
      0% { transform: rotate(0deg);}
      100% { transform: rotate(360deg);}
    }

    /* Footer */
    .footer {
      margin-top: 20px;
      font-size: 12px;
      color: #5476a6cc;
      user-select: none;
    }

    @media (max-width: 480px) {
      .container {
        padding: 22px 20px 24px 20px;
        max-width: 100%;
        border-radius: 16px;
      }

      .generate-btn, .copy-btn {
        font-size: 14px;
      }

      .code-display {
        font-size: 14px;
        min-height: 50px;
      }

      .logo {
        font-size: 26px;
        width: 60px;
        height: 60px;
      }
    }
  </style>
</head>
<body>
  <div class="container" role="main" aria-label="Calyx MD WhatsApp Pair code generator">
    <div class="header">
      <div class="logo" aria-label="Calyx &lt;/&gt; Studio logo">
        &lt;/&gt;
      </div>
      <h1 class="title">Calyx-MD Pair Code</h1>
      <p class="subtitle">Generate your WhatsApp MD pair code easily</p>
      <div class="social-icons">
        <a href="https://www.youtube.com/@calyxstudio" target="_blank" rel="noopener" aria-label="YouTube" class="youtube"><i class="fab fa-youtube"></i></a>
        <a href="https://t.me/calyxchannel" target="_blank" rel="noopener" aria-label="Telegram" class="telegram"><i class="fab fa-telegram-plane"></i></a>
        <a href="https://chat.whatsapp.com/YOUR_CHANNEL" target="_blank" rel="noopener" aria-label="WhatsApp Channel" class="whatsapp"><i class="fab fa-whatsapp"></i></a>
        <a href="https://github.com/calyxstudio/calyx-md" target="_blank" rel="noopener" aria-label="GitHub" class="github"><i class="fab fa-github"></i></a>
      </div>
    </div>

    <div class="input-group">
      <label for="mobileNumber" class="input-label">Enter your WhatsApp number with country code</label>
      <input type="text" id="mobileNumber" class="input-field" placeholder="+1234567890" pattern="\+[0-9]{10,15}" title="Start with + and enter 10 to 15 digits" autocomplete="off" />
    </div>

    <button class="generate-btn" id="submit">
      <i class="fas fa-key"></i> Generate code
    </button>

    <div class="loading" id="loading" aria-live="polite" role="status" aria-label="Loading">
      <i class="fas fa-spinner"></i>
    </div>

    <div class="code-display" id="codeDisplay" aria-live="polite" aria-atomic="true" role="region" tabindex="0" aria-label="Pair code display">
      Your pair code will appear here
    </div>

    <button class="copy-btn" id="copy" aria-label="Copy pair code to clipboard" disabled>
      <i class="fas fa-copy"></i> Copy Code
    </button>

    <div class="footer">
      <p>© 2025 Calyx &lt;/&gt; Studio | Calyx-MD Pair Code</p>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.0.0-alpha.1/axios.min.js"></script>
  <script>
    const submitBtn = document.getElementById("submit");
    const copyBtn = document.getElementById("copy");
    const mobileInput = document.getElementById("mobileNumber");
    const codeDisplay = document.getElementById("codeDisplay");
    const loading = document.getElementById("loading");

    function sanitizeNumber(number) {
      return number.replace(/[^0-9]/g, "");
    }

    async function generateCode(number) {
      try {
        const response = await axios(`/code?number=${number}`);
        return response.data.code ?? null;
      } catch {
        return null;
      }
    }

    submitBtn.addEventListener("click", async (e) => {
      e.preventDefault();
      const rawNumber = mobileInput.value.trim();

      if (!rawNumber) {
        codeDisplay.innerHTML = '<div class="error-message"><i class="fas fa-exclamation-circle"></i> Please enter your WhatsApp number</div>';
        copyBtn.disabled = true;
        return;
      }

      if (!/^\+\d{10,15}$/.test(rawNumber)) {
        codeDisplay.innerHTML = '<div class="error-message"><i class="fas fa-exclamation-circle"></i> Enter valid number with country code starting with +</div>';
        copyBtn.disabled = true;
        return;
      }

      loading.style.display = "block";
      codeDisplay.textContent = "";
      copyBtn.disabled = true;

      const sanitized = sanitizeNumber(rawNumber);
      const code = await generateCode(sanitized);

      loading.style.display = "none";

      if (code && code !== "Service Unavailable") {
        codeDisplay.innerHTML = `<div class="success-message"><i class="fas fa-check-circle"></i> CODE: ${code}</div>`;
        copyBtn.disabled = false;
      } else if (code === "Service Unavailable") {
        codeDisplay.innerHTML = '<div class="error-message"><i class="fas fa-exclamation-circle"></i> Service Unavailable</div>';
        copyBtn.disabled = true;
      } else {
        codeDisplay.innerHTML = '<div class="error-message"><i class="fas fa-exclamation-circle"></i> Error generating code. Please try again.</div>';
        copyBtn.disabled = true;
      }
    });

    copyBtn.addEventListener("click", () => {
      const codeText = codeDisplay.textContent.replace("CODE: ", "").trim();
      if (!codeText) return;

      navigator.clipboard.writeText(codeText).then(() => {
        const original = copyBtn.innerHTML;
        copyBtn.innerHTML = '<i class="fas fa-check"></i> Copied!';
        copyBtn.disabled = true;
        setTimeout(() => {
          copyBtn.innerHTML = original;
          copyBtn.disabled = false;
        }, 2500);
      }).catch(() => {
        alert("Copy failed. Please copy manually.");
      });
    });
  </script>
</body>
</html>
